services:
  qemu:
    container_name: qemu
    build: ..
    image: tailnet-qemu:0.0.2-beta
    devices:
      - /dev/kvm
      - /dev/vhost-net
      - /dev/net/tun
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      # Keeps the default primary network as passt (eth0)
      - NETWORK=passt
      # Injects your extra slirp networks directly into QEMU without touching .sh files
      - ARGUMENTS=-netdev user,id=net1,net=172.18.0.0/24 -device virtio-net-pci,netdev=net1 -netdev user,id=net2,net=124.10.0.0/24 -device virtio-net-pci,netdev=net2
    networks:
      zone1:
        ipv4_address: 172.18.0.100
      zone2:
        ipv4_address: 124.10.0.100

# Docker natively creates the subnets on the host and attaches them
networks:
  zone1:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
  zone2:
    driver: bridge
    ipam:
      config:
        - subnet: 124.10.0.0/24
