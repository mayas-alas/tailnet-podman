services:
  qemu:
    container_name: qemu
    build: ..
    image: tailnet-qemu:0.0.1-beta
    devices:
      - /dev/kvm
      - /dev/net/tun
    privileged: true
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage2
      - ./tmp:/storage
    restart: on-failure
    stop_grace_period: 2m
