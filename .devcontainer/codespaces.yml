version: "3.8"
services:
  qemu:
    container_name: qemu
    build: ..
    image: tailnet-qemu:0.0.1-beta
    
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/kvm
      - /dev/net/tun
      - /dev/vhost-net
    
    environment:
      - BOOT=proxmox
      - USER_PORTS=8006,22,5900
      - NETWORK=passt
      - ARGUMENTS=-netdev user,id=net1,net=172.18.0.0/24 -device virtio-net-pci,netdev=net1 -netdev user,id=net2,net=124.10.0.0/24 -device virtio-net-pci,netdev=net2
      
    networks:
      zone1:
        ipv4_address: 172.18.0.100
      zone2:
        ipv4_address: 124.10.0.100

networks:
  zone1:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24
  zone2:
    driver: bridge
    ipam:
      config:
        - subnet: 124.10.0.0/24
