services:
  qemu:
    container_name: qemu
    build: ..
    image: tailnet-qemu:0.0.1-beta
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage
      - ./tmp:/storage2
    restart: on-failure
    stop_grace_period: 2m
