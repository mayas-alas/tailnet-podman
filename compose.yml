services:
  qemu:
    image: tailnet-qemu:0.0.1-beta
    container_name: qemu
    build: .
    environment:
      BOOT: "proxmox"
    devices:
      - /dev/kvm
      - /dev/vhost-net
      - /dev/net/tun
    volumes:
      - ./tmp:/storage
      - ./qemu:/storage2
    restart: always
    depends_on:
      - tailscale
    network_mode: service:tailscale
  tailscale:
    image: tailscale/tailscale:latest
    container_name: qemu-tty
    hostname: qemu-tty
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    ports:
      - 8006:8006
    
   
  
