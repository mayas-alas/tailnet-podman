services:
  tailnet:
    build: .
    image: tailnet:test@0.0.1-beta
    container_name: tailnet:test/0.0.1-beta
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage
    restart: always
    stop_grace_period: 2m
