services:
  qemu:
    image: tailnet-qemu:0.0.1-beta
    container_name: qemu
    build: .
    environment:
      BOOT: "proxmox"
    devices:
      - /dev/kvm
      - /dev/net/tun
      - /dev/sda:/disk1
      - /dev/sdc:/disk2
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./qemu:/storage
    restart: always
    stop_grace_period: 2m
