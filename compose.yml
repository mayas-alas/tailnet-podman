services:
  qemu:
    image: tailnet:test@0.0.1-beta
    build: .
    container_name: qemu
    environment:
      BOOT: "/storage/boot.iso"
    devices:
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
    volumes:
      - ./storage:/storage
    restart: always
    stop_grace_period: 2m
